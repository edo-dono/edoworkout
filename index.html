<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="edoWorkout">
<meta name="theme-color" content="#0b0c0e">
<title>edoWorkout</title>

<!-- Police Roboto (chargée en ligne ; repli sur la police système hors-ligne) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  /* ============================================================
     edoWorkout — feuille de style
     Thème sombre "liquid glass", couleur d'accent jaune-vert pomme.
     Astuce : la plupart des surfaces sont translucides (--glass*)
     pour laisser transparaître le fond d'écran dégradé.
     ============================================================ */

  /* ---- Variables globales (couleurs, verre, encoches iOS) ---- */
  :root{
    --bg:#0b0c0e; --text:#f4f4f5; --muted:#9a9aa1;
    --accent:#c5f24a; --accent-dim:rgba(197,242,74,.16);
    --amber:#f5c451; --blue:#5aa9ff; --red:#ff6b6b;
    --glass:rgba(30,32,36,.5); --glass-strong:rgba(20,22,26,.66);
    --hair:rgba(255,255,255,.09); --hi:rgba(255,255,255,.10);
    --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}

  /* Le fond d'écran (dégradé + halos) est porté par <html> pour
     couvrir tout l'écran, même quand la page est courte. */
  html{
    margin:0; padding:0; color-scheme:dark; min-height:100dvh;
    background-color:#0c0e11;                        /* couleur de base : évite tout "trou" noir si le dégradé ne couvre pas */
    background-image:
      radial-gradient(60vw 60vw at 12% 4%, rgba(197,242,74,.34), transparent 60%),
      radial-gradient(62vw 62vw at 88% 96%, rgba(74,150,242,.30), transparent 60%),
      linear-gradient(160deg,#1c2027 0%,#121419 52%,#0c0e11 100%);
    background-attachment:fixed; background-repeat:no-repeat; background-size:cover;
  }
  body{
    margin:0; padding:0; color:var(--text); background:transparent; min-height:100dvh;
    font-family:'Roboto',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; -webkit-font-smoothing:antialiased;
    padding-bottom:calc(84px + var(--safe-bot)); /* place pour la barre d'onglets */
  }
  /* Le conteneur d'onglets occupe au moins toute la hauteur visible → pas d'espace
     vide/noir quand une page est courte (ex : "Aujourd'hui" après enregistrement). */
  #app{min-height:calc(100dvh - 96px - var(--safe-top) - var(--safe-bot));}
  button,input,select,textarea{font-family:inherit;}
  select option{background:#1b1d21; color:var(--text);}

  /* ---- En-tête (bannière) : nom de l'app centré ---- */
  .appbar{
    position:sticky; top:0; z-index:35; background:var(--glass-strong);
    backdrop-filter:blur(24px) saturate(1.8); -webkit-backdrop-filter:blur(24px) saturate(1.8);
    border-bottom:1px solid var(--hi); padding:calc(var(--safe-top) + 11px) 16px 12px;
  }
  .appbar .inner{max-width:560px; margin:0 auto; text-align:center;} /* centrage du titre */
  .brand{font-size:19px; font-weight:700; letter-spacing:-.3px;}
  .brand .kanji{color:var(--accent); font-size:23px; margin-right:7px; line-height:1;}

  /* ---- Conteneur principal des onglets ---- */
  #app{max-width:560px; margin:0 auto; padding:14px 16px 16px; position:relative;}
  h1{font-size:26px; font-weight:700; letter-spacing:-.5px; margin:2px 0 2px;}
  h2{font-size:12.5px; font-weight:600; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); margin:26px 0 12px;}
  .sub{color:var(--muted); font-size:14px; margin:0 0 4px;}
  .muted{color:var(--muted);} .accent{color:var(--accent);}

  /* ---- Carte en verre (brique visuelle de base) ---- */
  .card{
    position:relative; background:var(--glass);
    backdrop-filter:blur(22px) saturate(1.7); -webkit-backdrop-filter:blur(22px) saturate(1.7);
    border:1px solid var(--hair); border-radius:20px; padding:16px; overflow:hidden;
    box-shadow:inset 0 1px 0 var(--hi), 0 10px 34px rgba(0,0,0,.34);
  }
  .card::before{content:''; position:absolute; inset:0; border-radius:inherit; pointer-events:none; background:linear-gradient(180deg, rgba(255,255,255,.06), transparent 38%);}
  .row{display:flex; align-items:center; gap:12px;} .between{justify-content:space-between;}

  /* ---- Animation d'apparition au changement d'onglet ---- */
  @keyframes tabIn{from{opacity:0; transform:translateY(10px) scale(.985);} to{opacity:1; transform:none;}}
  .anim{animation:tabIn .34s cubic-bezier(.33,.1,.25,1);}

  /* ---- Onglet "Cette semaine" : anneau d'objectif + pastilles ---- */
  .goalwrap{display:flex; align-items:center; gap:18px; position:relative;}
  .ring{position:relative; width:84px; height:84px; flex:none;}
  .ring svg{transform:rotate(-90deg);}
  .ring .num{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .ring .num b{font-size:21px; font-weight:700; line-height:1;}
  .ring .num span{font-size:10.5px; color:var(--muted);}
  .goalmsg{font-size:15px; font-weight:600; line-height:1.35;}
  .goalmsg small{display:block; color:var(--muted); font-weight:400; font-size:13px; margin-top:3px;}
  .week{display:flex; justify-content:space-between; margin-top:18px; position:relative;}
  .day{display:flex; flex-direction:column; align-items:center; gap:6px; flex:1;}
  .day .lbl{font-size:11px; color:var(--muted);}
  .dot{width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,.06); border:1.5px solid var(--hair);
    display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:var(--muted);}
  .dot.done{background:var(--accent); border-color:var(--accent); color:#10130a; box-shadow:0 0 14px rgba(197,242,74,.4);}
  .dot.today{box-shadow:0 0 0 2px var(--accent);}
  .day .dnum{font-size:10px; color:var(--muted);}

  /* ---- Régularité (5 dernières semaines) ---- */
  .histweek{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .histweek .wk{font-size:10.5px; color:var(--muted); width:92px; flex:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .histweek .wk.cur{color:var(--accent); font-weight:700;}
  .minidots{display:flex; gap:6px;}
  .mini{width:14px; height:14px; border-radius:4px; background:rgba(255,255,255,.06);}
  .mini.done{background:var(--accent);}

  /* ---- Équilibre par groupe musculaire (barres) ---- */
  .bal{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .bal:last-child{margin-bottom:0;}
  .bal .g{width:88px; flex:none; font-size:13px; font-weight:600;}
  .bal .track{flex:1; height:9px; border-radius:6px; background:rgba(255,255,255,.06); overflow:hidden;}
  .bal .fill{height:100%; background:var(--accent); border-radius:6px;}
  .bal .n{width:22px; text-align:right; font-size:12px; color:var(--muted);}

  /* ---- Liste des machines + vignettes d'illustration ---- */
  .mlist{display:flex; flex-direction:column; gap:10px;}
  .mcard{display:flex; align-items:center; justify-content:space-between; cursor:pointer;}
  .mcard .name{font-size:16px; font-weight:600;}
  .mcard .meta{font-size:13px; color:var(--muted); margin-top:3px;}
  .chev{color:var(--muted); font-size:22px;}
  .mleft{display:flex; align-items:center; gap:13px; min-width:0;}
  .mthumb{width:48px; height:48px; flex:none; border-radius:13px; background:rgba(255,255,255,.05);
    border:1px solid var(--hair); display:flex; align-items:center; justify-content:center; color:var(--accent);}
  .mthumb svg{width:32px; height:32px;}
  .mthumb .mphoto{width:100%; height:100%; object-fit:cover; border-radius:13px; display:block;}
  .mhero{width:88px; height:88px; border-radius:20px; background:rgba(255,255,255,.05); border:1px solid var(--hair);
    display:flex; align-items:center; justify-content:center; color:var(--accent); margin:2px 0 12px; position:relative; overflow:hidden;}
  .mhero svg{width:58px; height:58px;}
  .mhero .mphoto{width:100%; height:100%; object-fit:cover; border-radius:20px; display:block;}
  .mhero.photo{cursor:zoom-in;}
  .mhero .zoomhint{position:absolute; bottom:4px; right:4px; background:var(--glass-strong); border:1px solid var(--hi);
    border-radius:8px; font-size:12px; line-height:1; padding:3px 5px; color:var(--text); pointer-events:none;}

  /* ---- Lightbox : photo de machine en plein écran (zoom) ---- */
  .zoom-bg{position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:95; display:none; align-items:center; justify-content:center;
    padding:calc(var(--safe-top) + 16px) 16px calc(var(--safe-bot) + 16px);}
  .zoom-bg.open{display:flex;}
  .zoom-bg img{max-width:100%; max-height:100%; object-fit:contain; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,.6);}
  .zoom-close{position:absolute; top:calc(var(--safe-top) + 12px); right:16px; width:40px; height:40px; border-radius:50%;
    background:var(--glass-strong); border:1px solid var(--hi); color:var(--text); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center;}

  /* ---- Badges de résultat / type ---- */
  .badge{display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; padding:3px 9px; border-radius:20px;}
  .b-ok{background:var(--accent-dim); color:var(--accent);}
  .b-part{background:rgba(245,196,81,.16); color:var(--amber);}
  .b-fail{background:rgba(255,107,107,.16); color:var(--red);}
  .b-cardio{background:rgba(90,169,255,.16); color:var(--blue);}
  .pr{color:var(--accent); font-weight:700; margin-left:6px; font-size:13px;}

  /* ---- Cartes d'exercice (historique / séance du jour) ---- */
  .dayhead{display:flex; align-items:baseline; justify-content:space-between; margin:2px 2px 10px;}
  .dayhead .d{font-size:15px; font-weight:700;} .dayhead .c{font-size:12px; color:var(--muted);}
  .ex{margin-bottom:10px; cursor:pointer;}
  .ex .top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;}
  .ex .nm{font-size:16px; font-weight:700;}
  .ex .big{font-size:16px; font-weight:700;} .ex .big small{font-size:13px; font-weight:500; color:var(--muted);}
  .tags{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;}
  .tag{font-size:12px; background:rgba(255,255,255,.07); color:var(--text); padding:3px 9px; border-radius:8px; border:1px solid var(--hair);}
  .tag b{color:var(--accent); font-weight:600;}
  .cmt{margin-top:10px; font-size:14px; color:#d4d4d9; line-height:1.4; background:rgba(255,255,255,.05); border-radius:10px; padding:9px 11px;}
  .empty{text-align:center; color:var(--muted); padding:28px 12px; font-size:14px; line-height:1.5;}

  /* ---- Bloc de progression (courbes) + records ---- */
  .metric{margin-bottom:16px;} .metric:last-child{margin-bottom:0;}
  .metric .mh{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;}
  .metric .mt{font-size:13px; font-weight:600; color:var(--muted);}
  .metric .mv{font-size:14px; font-weight:700;} .metric .mv small{color:var(--muted); font-weight:400; font-size:12px;}
  .chartwrap{position:relative; touch-action:pan-y;}                /* zone tactile de la courbe */
  .cmark{position:absolute; top:0; bottom:0; width:1.5px; background:rgba(255,255,255,.35); left:0; opacity:0; pointer-events:none;}
  .cmark.show{opacity:1;}
  .ctip{position:absolute; top:-6px; left:0; transform:translate(-50%,-100%); background:var(--glass-strong);
    backdrop-filter:blur(10px); border:1px solid var(--hi); border-radius:9px; padding:4px 8px; font-size:12px; font-weight:700;
    white-space:nowrap; opacity:0; pointer-events:none; z-index:6; box-shadow:0 4px 14px rgba(0,0,0,.4);}
  .ctip.show{opacity:1;}
  .rec{display:flex; justify-content:space-between; align-items:baseline; padding:9px 0; border-bottom:1px solid var(--hair);}
  .rec:last-child{border-bottom:none;} .rec span{font-size:14px; color:var(--muted);}
  .rec b{font-size:16px; font-weight:700;} .rec b small{color:var(--muted); font-weight:400; font-size:12px;}
  .info{display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:50%;
    border:1px solid var(--hair); color:var(--muted); font-size:11px; font-weight:700; font-style:italic; margin-left:7px; cursor:pointer; vertical-align:middle;}
  .info:active{color:var(--accent); border-color:var(--accent);}

  /* ---- Boutons ---- */
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:6px; background:var(--accent); color:#10130a;
    border:none; border-radius:15px; font-size:16px; font-weight:700; padding:14px 18px; width:100%; cursor:pointer; box-shadow:0 6px 18px rgba(197,242,74,.22);}
  .btn:active{transform:scale(.985);}
  .btn.ghost{background:rgba(255,255,255,.07); color:var(--text); border:1px solid var(--hair); box-shadow:none; backdrop-filter:blur(10px);}
  .btn.danger{background:rgba(255,107,107,.12); color:var(--red); border:1px solid rgba(255,107,107,.28); box-shadow:none;}
  .btn.sm{padding:10px 14px; font-size:14px; border-radius:12px;}

  /* ---- Boutons flottants : "Nouvel exercice" (centre) + "Repos" (bulle, gauche) ---- */
  /* "Nouvel exercice" : pilule centrée. Hauteur FIXE (54px) pour s'aligner
     exactement avec la bulle du minuteur (même bottom + même hauteur). */
  .fab{position:fixed; left:50%; transform:translateX(-50%); bottom:calc(98px + var(--safe-bot)); background:var(--accent); color:#10130a;
    border:none; height:54px; padding:0 24px; border-radius:30px; font-size:16px; font-weight:700;
    box-shadow:0 8px 26px rgba(0,0,0,.5), 0 0 22px rgba(197,242,74,.3); z-index:55; cursor:pointer; display:none; align-items:center; gap:8px;}
  .fab:active{transform:translateX(-50%) scale(.96);}
  /* Bulle du minuteur : même bottom + même hauteur (54px) que le FAB → bases alignées.
     Position gauche/droite pilotée par les classes .left / .right (réglable). */
  .restfab{position:fixed; bottom:calc(98px + var(--safe-bot)); width:54px; height:54px; border-radius:50%;
    background:var(--glass-strong); backdrop-filter:blur(20px) saturate(1.8); -webkit-backdrop-filter:blur(20px) saturate(1.8);
    border:1px solid var(--hi); color:var(--accent); display:none; align-items:center; justify-content:center;
    z-index:55; cursor:pointer; box-shadow:0 8px 26px rgba(0,0,0,.5);}
  .restfab.left{left:16px; right:auto;}
  .restfab.right{right:16px; left:auto;}
  .restfab svg{width:26px; height:26px;}
  .restfab:active{transform:scale(.94);}

  /* ---- Bandeau du minuteur de repos (apparaît pendant le repos) ---- */
  .restbar{position:fixed; left:12px; right:12px; bottom:calc(80px + var(--safe-bot)); z-index:58; max-width:536px; margin:0 auto;
    background:var(--glass-strong); backdrop-filter:blur(24px) saturate(1.8); -webkit-backdrop-filter:blur(24px) saturate(1.8);
    border:1px solid var(--hi); border-radius:16px; padding:11px 14px; display:none; box-shadow:0 8px 26px rgba(0,0,0,.5);}
  .restbar.show{display:block;}
  .restbar .rrow{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .restbar .rlabel{font-size:12px; color:var(--muted); font-weight:600;}
  .restbar .rtime{font-size:21px; font-weight:700; font-variant-numeric:tabular-nums; line-height:1.1;}
  .restbar .rbtns{display:flex; gap:8px;}
  .restbar .rbtns button{background:rgba(255,255,255,.08); border:1px solid var(--hair); color:var(--text); border-radius:11px; padding:8px 13px; font-size:13px; font-weight:600; cursor:pointer;}
  .restprog{height:5px; border-radius:4px; background:rgba(255,255,255,.08); margin-top:9px; overflow:hidden;}
  .restprog>div{height:100%; background:var(--accent); width:100%; transition:width .35s linear;}
  /* Fin du repos : le décompte est remplacé par "Terminé", clignotant en vert pomme. */
  @keyframes restDoneBlink{0%,100%{opacity:1; transform:scale(1);} 50%{opacity:.25; transform:scale(1.04);}}
  .restbar .rtime.done{color:var(--accent); animation:restDoneBlink 1s ease-in-out infinite; transform-origin:left center;}

  /* ---- Barre d'onglets (bas) ---- */
  .tabbar{position:fixed; bottom:0; left:0; right:0; background:var(--glass-strong); backdrop-filter:blur(28px) saturate(1.8);
    -webkit-backdrop-filter:blur(28px) saturate(1.8); border-top:1px solid var(--hi); display:flex; justify-content:space-around;
    padding:9px 4px calc(9px + var(--safe-bot)); z-index:60; box-shadow:0 -8px 30px rgba(0,0,0,.35);}
  .tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--muted); font-size:10px; font-weight:500;
    background:none; border:none; cursor:pointer; padding:5px 2px; border-radius:14px; transition:color .25s, background .25s; white-space:nowrap;}
  .tab.active{color:#10130a; background:var(--accent);}
  .tab svg{width:23px; height:23px;}

  /* ---- Écrans superposés (détail machine, édition machines) ---- */
  .screen{position:fixed; inset:0; background:rgba(12,13,16,.42); backdrop-filter:blur(30px) saturate(1.6);
    -webkit-backdrop-filter:blur(30px) saturate(1.6); z-index:40; overflow-y:auto;
    padding:calc(var(--safe-top) + 10px) 16px calc(96px + var(--safe-bot));
    opacity:0; transform:translateY(14px); visibility:hidden; pointer-events:none;
    transition:opacity .3s cubic-bezier(.33,.1,.25,1), transform .3s cubic-bezier(.33,.1,.25,1), visibility .3s;}
  .screen.open{opacity:1; transform:none; visibility:visible; pointer-events:auto;}
  .screen .inner{max-width:560px; margin:0 auto;}
  .navbar{display:flex; align-items:center; margin-bottom:6px;}
  .back{background:none; border:none; color:var(--accent); font-size:16px; font-weight:600; display:flex; align-items:center; gap:2px; cursor:pointer; padding:6px 0;}
  .back:active{opacity:.5;}

  /* ---- Feuille du bas (formulaire d'exercice) ---- */
  .sheet-bg{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:70; display:none; backdrop-filter:blur(3px);}
  .sheet-bg.open{display:block;}
  .sheet{position:fixed; left:0; right:0; bottom:0; z-index:71; max-height:93vh; overflow-y:auto; background:var(--glass-strong);
    backdrop-filter:blur(30px) saturate(1.8); -webkit-backdrop-filter:blur(30px) saturate(1.8); border-top:1px solid var(--hi);
    border-radius:24px 24px 0 0; padding:8px 16px calc(20px + var(--safe-bot)); transform:translateY(100%);
    transition:transform .3s cubic-bezier(.33,.1,.25,1); max-width:560px; margin:0 auto;}
  .sheet.open{transform:translateY(0);}
  .grab{width:38px; height:5px; background:rgba(255,255,255,.25); border-radius:3px; margin:8px auto 16px;}
  .sheet h3{font-size:20px; font-weight:700; margin:0 0 16px;}

  /* ---- Champs de formulaire ---- */
  label{display:block; font-size:13px; font-weight:600; color:var(--muted); margin:0 0 7px;}
  input,select,textarea{width:100%; background:rgba(255,255,255,.06); border:1px solid var(--hair); color:var(--text);
    border-radius:13px; padding:13px 14px; font-size:16px;}
  input:focus,select:focus,textarea:focus{outline:none; border-color:var(--accent); background:rgba(255,255,255,.09);}
  input.bad{border-color:var(--red); background:rgba(255,107,107,.08);}     /* champ invalide */
  textarea{resize:none; min-height:70px;}
  .field{margin-bottom:16px;}
  .two{display:flex; gap:12px;} .two>.field{flex:1;}
  .err{color:var(--red); font-size:12px; margin-top:6px; display:none;} .err.show{display:block;}
  .readonly{font-size:15px; font-weight:600; padding:11px 0;}
  .seg{display:flex; gap:8px;}
  .seg button{flex:1; background:rgba(255,255,255,.06); border:1px solid var(--hair); color:var(--muted); border-radius:12px;
    padding:11px 6px; font-size:14px; font-weight:600; cursor:pointer;}
  .seg button.sel.ok{background:var(--accent-dim); border-color:var(--accent); color:var(--accent);}
  .seg button.sel.part{background:rgba(245,196,81,.16); border-color:var(--amber); color:var(--amber);}
  .seg button.sel.fail{background:rgba(255,107,107,.16); border-color:var(--red); color:var(--red);}
  .cfgrow{display:flex; gap:8px; align-items:flex-end; margin-bottom:10px;}
  .cfgrow .f{flex:1;} .cfgrow .cfglabel{margin-bottom:6px;}
  .xbtn{flex:none; width:46px; height:48px; background:rgba(255,255,255,.06); border:1px solid var(--hair); color:var(--muted);
    border-radius:13px; font-size:19px; cursor:pointer;}
  .addcfg{background:none; border:1px dashed var(--hair); color:var(--accent); width:100%; border-radius:13px; padding:11px; font-size:14px; font-weight:600; cursor:pointer;}
  .medit{padding:12px; margin-bottom:10px;}
  .medit select{margin-top:2px;}

  /* ---- Sélecteurs +/- (objectif, repos) ---- */
  .stepper{display:flex; align-items:center; gap:14px;}
  .stepper button{width:46px; height:46px; border-radius:13px; background:rgba(255,255,255,.06); border:1px solid var(--hair); color:var(--text); font-size:22px; cursor:pointer;}
  .stepper button:disabled{opacity:.35;}

    border:1px solid var(--hi); border-radius:22px; padding:22px; max-width:340px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,.55);}
  .modal p{font-size:16px; line-height:1.45; margin:0 0 18px; font-weight:500;}
  .modal .btn.ghost{margin-top:9px;}
</style>

<body>

<!-- En-tête : titre centré -->
<header class="appbar"><div class="inner"><span class="brand"><span class="kanji">筋</span>edo<b style="color:var(--accent)">Workout</b></span></div></header>

<!-- Conteneur où chaque onglet est rendu -->
<div id="app"></div>

<!-- Boutons flottants : nouvel exercice (centre) + lancer le repos (bulle, bas-gauche) -->
<button class="fab" id="fab" onclick="openForm({})">＋ Nouvel exercice</button>
<button class="restfab" id="restfab" onclick="startRest(state.settings.restSeconds)" title="Lancer le repos">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2h6"/><path d="M12 5V2"/><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 1.5"/></svg>
</button>

<!-- Bandeau du minuteur de repos (countdown) -->
<div class="restbar" id="restbar">
  <div class="rrow">
    <div><div class="rlabel">Repos</div><div class="rtime" id="rest-time">60 s</div></div>
    <div class="rbtns"><button onclick="addRest(15)">+15 s</button><button onclick="stopRest()">Passer</button></div>
  </div>
  <div class="restprog"><div id="rest-fill"></div></div>
</div>

<!-- Écrans superposés -->
<div class="screen" id="screen-machine"><div class="inner" id="screen-machine-inner"></div></div>
<div class="screen" id="screen-medit"><div class="inner" id="screen-medit-inner"></div></div>

<!-- Champ caché pour l'import de sauvegarde -->
<input type="file" id="import-file" accept=".json,application/json" style="display:none">

<!-- Barre d'onglets -->
<div class="tabbar">
  <button class="tab active" id="tab-today" onclick="goTab('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5l11 11M3 3l1 1M20 20l1 1M18 22l4-4M2 6l4-4M7 17l-5 5M22 7l-5-5"/></svg>Aujourd'hui</button>
  <button class="tab" id="tab-week" onclick="goTab('week')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>Cette semaine</button>
  <button class="tab" id="tab-machines" onclick="goTab('machines')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="9" width="4" height="6" rx="1"/><rect x="17" y="9" width="4" height="6" rx="1"/><path d="M7 12h10M2 11v2M22 11v2"/></svg>Machines</button>
  <button class="tab" id="tab-settings" onclick="goTab('settings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Réglages</button>
</div>

<!-- Formulaire (feuille du bas) : champs muscu OU cardio selon la machine -->
<div class="sheet-bg" id="sheet-bg" onclick="closeForm()"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <!-- Barre du haut : bouton retour (annule l'ajout/la modification) -->
  <div class="navbar" style="margin-bottom:4px"><button class="back" onclick="closeForm()">‹ Retour</button></div>
  <h3 id="sheet-title">Nouvel exercice</h3>

  <!-- Champs MUSCULATION -->

        <input type="text" id="f-reps" inputmode="numeric" autocomplete="off" placeholder="10">
        <div class="err" id="err-reps">Entier ≥ 1.</div></div>
    </div>

      <div class="seg" id="f-status">

        <button data-s="fail" class="fail">Échoué ✗</button>
      </div></div>
    <div class="field"><label>Configurations <span class="muted">(max 3 · dossier, coussin…)</span></label>
      <div id="f-configs"></div>
      <button class="addcfg" id="add-cfg" onclick="addConfigRow('')">＋ Ajouter une configuration</button></div>
  </div>

  <!-- Champs CARDIO -->
  <div id="fields-cardio" style="display:none">
    <div class="field"><label>Programme</label><select id="f-prog"></select></div>
    <div class="two">
      <div class="field"><label>Niveau (1–25)</label>
        <input type="text" id="f-level" inputmode="numeric" autocomplete="off" placeholder="ex : 8">
        <div class="err" id="err-level">Entier entre 1 et 25.</div></div>
      <div class="field"><label>Durée (min)</label>
        <input type="text" id="f-dur" inputmode="numeric" autocomplete="off" placeholder="30">
        <div class="err" id="err-dur">Entier ≥ 1.</div></div>
    </div>
    <!-- Champs facultatifs -->
    <div class="two">
      <div class="field"><label>Tour / minute <span class="muted">(facultatif)</span></label>
        <input type="text" id="f-rpm" inputmode="numeric" autocomplete="off" placeholder="ex : 60">
        <div class="err" id="err-rpm">Nombre ≥ 0.</div></div>
      <div class="field"><label>Distance <span class="muted">(facultatif)</span></label>
        <input type="text" id="f-dist" inputmode="decimal" autocomplete="off" placeholder="ex : 5 km">
      </div>
    </div>
  </div>

  <div class="field"><label>Commentaire</label>
    <textarea id="f-comment" placeholder="Ex : essoufflé, bonne séance, baisser le niveau la prochaine fois…"></textarea></div>
  <button class="btn" onclick="saveExercise()">Enregistrer</button>
  <button class="btn danger" id="f-delete" style="display:none; margin-top:10px" onclick="deleteCurrent()">Supprimer cet exercice</button>
  <button class="btn ghost" style="margin-top:8px" onclick="closeForm()">Annuler</button>
</div>

<!-- Modale de confirmation (réutilisable) -->
<div class="modal-bg" id="confirm-bg">
  <div class="modal">
    <p id="confirm-msg"></p>
    <button class="btn danger" id="confirm-yes">Confirmer</button>
    <button class="btn ghost" id="confirm-no">Annuler</button>
  </div>
</div>
<!-- Modale d'information -->
<div class="modal-bg" id="info-bg">
  <div class="modal">
    <p id="info-title" style="font-weight:700; font-size:17px; margin-bottom:8px"></p>
    <p id="info-msg" style="font-weight:400; color:#d4d4d9; font-size:15px"></p>
    <button class="btn ghost" onclick="closeInfo()">Compris</button>
  </div>
</div>

<!-- Lightbox photo de machine (zoom plein écran) -->
<div class="zoom-bg" id="zoom-bg" onclick="closePhotoZoom()">

  <img id="zoom-img" src="" alt="Photo de la machine">
</div>

<div class="toast" id="toast"></div>

<script>
/* ================================================================

   - `state` : objet unique { settings, machines[], exercises[] }.
   - Persistance : IndexedDB (principal) + localStorage (secours),
     écrits ensemble par save(). Au démarrage on lit l'un OU l'autre.
   - Rendu : 4 onglets rendus dans #app via setView(html). Deux
     écrans superposés (détail machine, édition machines).
   - Une "séance" = tous les exercices d'une même date (implicite).
   - Deux types de machine : 'strength' (muscu) et 'cardio',

/* ===== Constantes de version ===== */

const ICON_URL='data:image/svg+xml,'+encodeURIComponent(ICON_SVG);

/* ===== Catégories / groupes musculaires ===== */
const GROUPS=['Jambes','Pectoraux','Dos','Épaules','Bras','Abdos','Cardio','Autre'];

// Groupe par défaut selon le nom (utilisé pour migrer d'anciennes données)
const GROUP_BY_NAME={

  'chest press':'Pectoraux','pectoral fly':'Pectoraux','pull down':'Dos',
  'shoulder press':'Épaules','rear deltoid':'Épaules','biceps curl':'Bras','abdominal':'Abdos',

};

/* ===== Illustrations des machines (tracés SVG, clé = nom en minuscules) ===== */
const MACHINE_ART={
  'leg press':'<circle cx="30" cy="34" r="7"/><path d="M18 68 L30 42"/><path d="M18 68 H36"/><path d="M16 68 V56"/><path d="M34 63 L56 50"/><path d="M56 50 L66 60"/><path d="M70 44 L78 66"/><path d="M72 50 H86"/><path d="M72 58 H86"/>',

  'pull down':'<circle cx="40" cy="50" r="7"/><path d="M40 57 V72"/><path d="M32 72 H48"/><path d="M40 60 L30 46"/><path d="M40 60 L50 46"/><path d="M24 44 H56"/><path d="M40 26 V44"/>',
  'biceps curl':'<circle cx="36" cy="26" r="7"/><path d="M36 33 V62"/><path d="M30 70 H44"/><path d="M36 44 L46 52"/><path d="M46 52 L42 36"/><path d="M37 34 H47"/><path d="M39 40 H49"/>',
  'abdominal':'<circle cx="34" cy="36" r="7"/><path d="M34 43 L44 62"/><path d="M44 62 V70"/><path d="M28 70 H50"/><path d="M26 70 V60"/><path d="M30 46 L48 54"/><path d="M30 40 L24 30"/>',
  'vélo elliptique':'<circle cx="48" cy="22" r="6"/><path d="M48 28 V50"/><path d="M48 34 L36 26"/><path d="M48 34 L60 26"/><path d="M48 50 L34 70"/><path d="M48 50 L62 70"/><ellipse cx="48" cy="78" rx="26" ry="6"/>',

};
const MACHINE_ART_GENERIC='<path d="M30 36 V60"/><path d="M22 42 V54"/><path d="M66 36 V60"/><path d="M74 42 V54"/><path d="M30 48 H66"/>'; // haltère par défaut

/** Renvoie le SVG d'illustration d'une machine (par son nom). */
function machineArt(name){
  const key=(name||'').trim().toLowerCase();
  // On essaie le nom complet, puis le nom sans la précision entre parenthèses
  // (ex : "chest press (poignée vers l'avant)" → "chest press").
  const base=key.replace(/\s*\(.*\)\s*$/,'').trim();
  const inner=MACHINE_ART[key]||MACHINE_ART[base]||MACHINE_ART_GENERIC;
  return `<svg viewBox="0 0 96 96" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;
}

/* ===== Photos des machines (URLs externes ; repli sur le tracé SVG hors-ligne) =====
   Clé = nom en minuscules (la précision entre parenthèses est ignorée à la recherche). */
const MACHINE_PHOTO={
  'vélo elliptique':'https://shop.lifefitness.com/cdn/shop/files/E1-Crosstrainer-TrackConnect-console-standardview.jpg?v=1748945392&width=500',
  'tapis de course':'https://shop.lifefitness.com/cdn/shop/files/F3-Treadmill-Track_Connect-console-StandardView.jpg?v=1748945393&width=500',
  'pectoral fly':'https://shop.lifefitness.com/cdn/shop/files/axiom-life-fitness-pectoralfly-reardealt-platinum-black-1000x1000.jpg?v=1748945227&width=500',
  'abdominal':'https://shop.lifefitness.com/cdn/shop/files/axiom-life-fitness-abdominal-back-extension-platinum-black-1000x1000.jpg?v=1748945229&width=500',
  'hip abduction':'https://shop.lifefitness.com/cdn/shop/files/axiom-life-fitness-abductor-adductor-charcoal-black-1000x1000.jpg?v=1748945228&width=800',
  'chest press':'https://shop.lifefitness.com/cdn/shop/files/CI-MP_Cybex_Ion_Multi-Press-charcoal-black-1000x1000.jpg?v=1748945222&width=800',
  'leg curl':'https://shop.lifefitness.com/cdn/shop/files/axiom-leg-curl-charcoal-black_1000x1000_a2eabf9b-7f98-45e3-81f5-d65a9974d475.jpg?v=1748945224&width=800',
  "vélo d'entraînement":'https://shop.lifefitness.com/cdn/shop/products/C1-Upright-Go-L_056393d2-4eb8-46c5-869f-9a5740237931.jpg?v=1748945387&width=800',
  'vélo couché':'https://shop.lifefitness.com/cdn/shop/products/RS1-Recumbent-Go-L_0f9f29ba-8242-4e6e-9cad-0adc5794b2dc.jpg?v=1748945384&width=800'
};
/** Renvoie l'URL de la photo d'une machine (ou null), avec repli sur le nom sans parenthèses. */
function machinePhotoURL(name){
  const key=(name||'').trim().toLowerCase();
  const base=key.replace(/\s*\(.*\)\s*$/,'').trim();
  return MACHINE_PHOTO[key]||MACHINE_PHOTO[base]||null;
}
/** Si une photo ne charge pas (hors-ligne), on la remplace par le tracé SVG. */
function imgFallback(img){
  try{
    const span=document.createElement('span');
    span.innerHTML=machineArt(img.getAttribute('data-name'));
    const svg=span.firstChild; img.replaceWith(svg);
    const hero=svg.closest('.mhero'); if(hero){ hero.classList.remove('photo'); hero.onclick=null; const h=hero.querySelector('.zoomhint'); if(h) h.remove(); }
  }catch(e){}
}
/** Vignette de machine (photo si dispo, sinon tracé SVG). */
function machineThumbHTML(m){
  const url=machinePhotoURL(m.name);
  return url
    ? `<span class="mthumb"><img class="mphoto" src="${url}" data-name="${esc(m.name)}" alt="" onerror="imgFallback(this)"></span>`
    : `<span class="mthumb">${machineArt(m.name)}</span>`;
}
/** Grande image (hero) de la fiche machine — zoomable au toucher si c'est une photo. */
function machineHeroHTML(m){
  const url=machinePhotoURL(m.name);
  return url
    ? `<div class="mhero photo" onclick="openPhotoZoom('${url}')"><img class="mphoto" src="${url}" data-name="${esc(m.name)}" alt="" onerror="imgFallback(this)"><span class="zoomhint">⤢</span></div>`
    : `<div class="mhero">${machineArt(m.name)}</div>`;
}

  {name:'Chest press (poignée vers l\'avant)',group:'Pectoraux',type:'strength'},{name:'Pectoral fly',group:'Pectoraux',type:'strength'},
  {name:'Pull down',group:'Dos',type:'strength'},
  {name:'Shoulder press',group:'Épaules',type:'strength'},{name:'Rear deltoid',group:'Épaules',type:'strength'},
  {name:'Biceps curl',group:'Bras',type:'strength'},
  {name:'Abdominal',group:'Abdos',type:'strength'},
  {name:'Vélo elliptique',group:'Cardio',type:'cardio'},{name:'Escaliers mécaniques',group:'Cardio',type:'cardio'},
  {name:"Vélo d'entraînement",group:'Cardio',type:'cardio'},{name:'Rameur',group:'Cardio',type:'cardio'},
  {name:'Tapis de course',group:'Cardio',type:'cardio'},{name:'Vélo couché',group:'Cardio',type:'cardio'}
];
let state={ settings:{weeklyGoal:3,restSeconds:60}, machines:[], exercises:[] };
let storagePersisted=false;                          // stockage persistant accordé par le navigateur ?

/** Génère un identifiant court unique. */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/** Complète/corrige l'état chargé (valeurs par défaut, migrations légères). */
function normalize(){
  if(!state.machines||!state.machines.length){
    state.machines=DEFAULT_MACHINES.map(m=>({id:uid(),name:m.name,group:m.group,type:m.type}));
  }
  state.machines.forEach(m=>{
    if((m.name||'').trim().toLowerCase()==='hip adduction') m.name='Hip abduction'; // correction de nom
    if((m.name||'').trim().toLowerCase()==='chest press') m.name='Chest press (poignée vers l\'avant)'; // précision poignée
    if((m.name||'').trim().toLowerCase()==="vélo d'appartement") m.name="Vélo d'entraînement"; // renommage v1.2
    if(!m.type) m.type='strength';
    if(!m.group) m.group=(m.type==='cardio')?'Cardio':(GROUP_BY_NAME[(m.name||'').trim().toLowerCase()]||'Autre');
  });
  if(!state.settings) state.settings={};
  state.settings.weeklyGoal=Math.max(1,Math.min(7,state.settings.weeklyGoal||3));
  state.settings.restSeconds=Math.max(15,Math.min(300,state.settings.restSeconds||60));
  if(state.settings.restPos!=='left' && state.settings.restPos!=='right') state.settings.restPos='right'; // bulle à droite par défaut
  if(!state.exercises) state.exercises=[];
}

/** Lit l'état depuis localStorage (avec migration des anciennes clés). */
function readLocal(){
  try{
    const r=localStorage.getItem(STORE);
    if(r) return JSON.parse(r);
    // Migrations depuis les anciennes versions
    const v2=localStorage.getItem('muscu-app-v2');
    if(v2){ const o=JSON.parse(v2); return {settings:o.settings,machines:o.machines,exercises:o.exercises||[]}; }
    const v1=localStorage.getItem('muscu-app-v1');
    if(v1){ const o=JSON.parse(v1); return {settings:o.settings,machines:o.machines,
      exercises:(o.sessions||[]).map(s=>({id:s.id||uid(),machineId:s.machineId,date:s.date,weight:s.weight,sets:s.sets,reps:s.reps,status:s.status,configs:s.configs||[],comment:s.comment||''}))}; }
  }catch(e){ console.warn(e); }
  return null;
}

/** Sauvegarde l'état dans les DEUX stockages (localStorage + IndexedDB). */
function save(){
  try{ localStorage.setItem(STORE,JSON.stringify(state)); }catch(e){ console.warn(e); }
  idbSet(state);
}

/* ----- IndexedDB : petite base clé/valeur (stockage principal) ----- */
const DB_NAME='edoworkout-db', DB_STORE='kv', DB_KEY='state';
let db=null;
function idbOpen(){
  return new Promise(res=>{
    try{
      const r=indexedDB.open(DB_NAME,1);
      r.onupgradeneeded=()=>{ try{ r.result.createObjectStore(DB_STORE); }catch(e){} };
      r.onsuccess=()=>res(r.result);
      r.onerror=()=>res(null);
    }catch(e){ res(null); }
  });
}
function idbGet(){
  return new Promise(res=>{
    if(!db) return res(null);
    try{
      const req=db.transaction(DB_STORE,'readonly').objectStore(DB_STORE).get(DB_KEY);
      req.onsuccess=()=>res(req.result||null);
      req.onerror=()=>res(null);
    }catch(e){ res(null); }
  });
}
function idbSet(val){ try{ if(db) db.transaction(DB_STORE,'readwrite').objectStore(DB_STORE).put(val,DB_KEY); }catch(e){} }

/* ===== Utilitaires dates & données ===== */
const DAY_LETTER=['L','M','M','J','V','S','D'];
function startOfWeek(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; } // lundi
function isoDate(d){ const x=new Date(d); return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0'); }
function todayISO(){ return isoDate(new Date()); }
function fmtDate(iso){ return new Date(iso+'T00:00:00').toLocaleDateString('fr-CH',{weekday:'short',day:'numeric',month:'short'}); }
function fmtDateFull(iso){ return new Date(iso+'T00:00:00').toLocaleDateString('fr-CH',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function weekRangeLabel(start){
  const e=new Date(start); e.setDate(start.getDate()+6);
  const sM=start.toLocaleDateString('fr-CH',{month:'short'}), eM=e.toLocaleDateString('fr-CH',{month:'short'});
  return sM===eM ? start.getDate()+'–'+e.getDate()+' '+eM : start.getDate()+' '+sM+'–'+e.getDate()+' '+eM;
}
function machine(id){ return state.machines.find(m=>m.id===id); }
function machineName(id){ const m=machine(id); return m?m.name:'(machine supprimée)'; }
function machineGroup(id){ const m=machine(id); return (m&&m.group)||'Autre'; }
function isCardioMachine(id){ const m=machine(id); return !!(m&&m.type==='cardio'); }
function esc(t){ return (t||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/** Jours (dates) où au moins un exercice a été fait dans la semaine donnée. */
function gymDays(weekStart){
  const a=isoDate(weekStart), e=new Date(weekStart); e.setDate(e.getDate()+6); const b=isoDate(e);
  const set=new Set();
  state.exercises.forEach(x=>{ if(x.date>=a&&x.date<=b) set.add(x.date); });
  return set;
}
/** Regroupe une liste d'exercices par date (du plus récent au plus ancien). */
function groupByDate(list){
  const m={};
  list.forEach(x=>{ (m[x.date]=m[x.date]||[]).push(x); });
  // Dates décroissantes, et à l'intérieur d'un jour : ordre de création décroissant
  // (id basé sur l'horodatage → le plus récent d'abord).
  return Object.keys(m).sort((a,b)=>b.localeCompare(a)).map(d=>({
    date:d,
    items:m[d].slice().sort((a,b)=>String(b.id).localeCompare(String(a.id)))
  }));
}
function statusLabel(s){ return s==='success'?'Réussi':s==='partial'?'Partiel':'Échoué'; }
function statusBadge(s){ return s==='success'?'<span class="badge b-ok">Réussi</span>':s==='partial'?'<span class="badge b-part">Partiel</span>':'<span class="badge b-fail">Échoué</span>'; }
function lastForMachine(id){ const l=state.exercises.filter(x=>x.machineId===id).sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)); return l[0]||null; }
function ex1rm(x){ return Math.round(Number(x.weight)*(1+Number(x.reps)/30)); } // 1RM estimé (Epley)
function machineMaxWeight(id){ const ws=state.exercises.filter(x=>x.machineId===id).map(x=>Number(x.weight)); return ws.length?Math.max(...ws):null; }
function machineCount(id){ return state.exercises.filter(x=>x.machineId===id).length; }
/** Nombre d'exercices par groupe musculaire pour la semaine en cours. */
function weekGroupCounts(){
  const ws=startOfWeek(new Date()), a=isoDate(ws), e=new Date(ws); e.setDate(e.getDate()+6); const b=isoDate(e);
  const c={};
  state.exercises.forEach(x=>{ if(x.date>=a&&x.date<=b){ const g=machineGroup(x.machineId); c[g]=(c[g]||0)+1; } });
  return c;
}

/* ===== Courbe interactive (sparkline + repère au toucher) ===== */
function chartHTML(values,dates,color,unit){
  if(values.length<2) return '';
  const W=320,H=70,pad=8;
  const min=Math.min(...values),max=Math.max(...values),range=(max-min)||1,n=values.length;
  const X=i=>pad+(i/(n-1))*(W-2*pad);
  const Y=v=>H-pad-((v-min)/range)*(H-2*pad);
  let d='',dots='';
  values.forEach((v,i)=>{
    d+=(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)+' ';
    dots+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="2.6" fill="${color}"/>`;
  });
  const area=d+`L ${X(n-1).toFixed(1)} ${H} L ${X(0).toFixed(1)} ${H} Z`;
  const svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block"><path d="${area}" fill="${color}" opacity="0.13"/><path d="${d}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg>`;
  // Données embarquées (encodées) pour l'interactivité
  const payload=encodeURIComponent(JSON.stringify({v:values,d:dates.map(fmtDate),u:unit}));
  return `<div class="chartwrap chart" data-series="${payload}">${svg}<div class="cmark"></div><div class="ctip"></div></div>`;
}
/** Active le repère tactile sur toutes les courbes d'un conteneur. */
function initCharts(scope){
  (scope||document).querySelectorAll('.chart').forEach(el=>{
    if(el._init) return; el._init=true;
    let data; try{ data=JSON.parse(decodeURIComponent(el.dataset.series)); }catch(e){ return; }
    const mark=el.querySelector('.cmark'), tip=el.querySelector('.ctip');
    const n=data.v.length, W=320, pad=8; let active=false;
    function show(clientX){
      const r=el.getBoundingClientRect();
      let ratio=(clientX-r.left)/r.width; ratio=Math.max(0,Math.min(1,ratio));
      const idx=Math.round(ratio*(n-1));
      const px=((pad+(idx/(n-1))*(W-2*pad))/W)*r.width;
      mark.style.left=px+'px'; mark.classList.add('show');
      tip.textContent=data.d[idx]+' · '+data.v[idx]+data.u; tip.style.left=px+'px'; tip.classList.add('show');
    }
    function hide(){ active=false; mark.classList.remove('show'); tip.classList.remove('show'); }
    el.addEventListener('pointerdown',e=>{ active=true; try{el.setPointerCapture(e.pointerId);}catch(_){ } show(e.clientX); });
    el.addEventListener('pointermove',e=>{ if(active) show(e.clientX); });
    el.addEventListener('pointerup',hide); el.addEventListener('pointercancel',hide);
  });
}
/** Bloc "métrique" = titre + dernière valeur (min/max) + courbe. */
function metricBlock(title,values,dates,unit,color){
  const last=values[values.length-1],min=Math.min(...values),max=Math.max(...values);
  return `<div class="metric"><div class="mh"><span class="mt">${title}</span><span class="mv">${last}${unit} <small>· min ${min} / max ${max}</small></span></div>${chartHTML(values,dates,color,unit)}</div>`;
}

/* ===== Rendu des onglets ===== */
let currentTab='today';

/** Remplace le contenu de #app, relance l'animation et REMONTE EN HAUT. */
function setView(html){
  const a=document.getElementById('app');
  a.classList.remove('anim');
  a.innerHTML=html;
  void a.offsetWidth;                                 // force le redémarrage de l'animation
  a.classList.add('anim');
  window.scrollTo(0,0);                               // toujours afficher le haut de la page
  document.documentElement.scrollTop=0;
}
function anyOverlayOpen(){ return document.getElementById('screen-machine').classList.contains('open')||document.getElementById('screen-medit').classList.contains('open'); }
function closeOverlays(){ document.getElementById('screen-machine').classList.remove('open'); document.getElementById('screen-medit').classList.remove('open'); }

/** Affiche/masque les boutons flottants (visibles seulement sur "Aujourd'hui",
    hors écran superposé, et pas pendant le repos). */
function updateFloating(){
  const restShown=document.getElementById('restbar').classList.contains('show');
  const visible=(currentTab==='today' && !anyOverlayOpen() && !restShown);
  document.getElementById('fab').style.display=visible?'flex':'none';
  const rf=document.getElementById('restfab');
  rf.style.display=visible?'flex':'none';
  // Position gauche/droite selon le réglage (droite par défaut)
  const pos=(state.settings.restPos==='left')?'left':'right';
  rf.classList.toggle('left',pos==='left');
  rf.classList.toggle('right',pos==='right');
}

function render(){
  if(currentTab==='today') renderToday();
  else if(currentTab==='week') renderWeek();
  else if(currentTab==='machines') renderMachines();
  else if(currentTab==='settings') renderSettings();

/** Carte d'un exercice (rendu différent muscu / cardio). */
function exerciseCard(x){
  // --- Cardio ---
  if(isCardioMachine(x.machineId)){
    // Tags facultatifs (n'apparaissent que s'ils sont renseignés)
    const extra=[];
    if(x.rpm!==''&&x.rpm!=null) extra.push(`<span class="tag"><b>Tr/min</b> · ${esc(String(x.rpm))}</span>`);
    if(x.distance!==''&&x.distance!=null) extra.push(`<span class="tag"><b>Distance</b> · ${esc(String(x.distance))}</span>`);
    return `<div class="card ex" onclick="editExercise('${x.id}')">
      <div class="top"><div class="nm">${esc(machineName(x.machineId))}</div><span class="badge b-cardio">Cardio</span></div>
      <div class="row between"><div class="big">${x.duree} min <small>·</small> Niv. ${x.niveau} <small>·</small> ${esc(x.programme||'')}</div></div>
      ${extra.length?`<div class="tags">${extra.join('')}</div>`:''}
      ${x.comment?`<div class="cmt">${esc(x.comment)}</div>`:''}</div>`;
  }
  // --- Musculation ---
  const max=machineMaxWeight(x.machineId);
  const isPR = max!=null && machineCount(x.machineId)>=2 && Number(x.weight)===max && Number(x.weight)>0;
  const configs=(x.configs||[]).map((c,i)=>`<span class="tag"><b>Config ${i+1}</b> · ${esc(c)}</span>`).join('');
  const w=(x.weight!==''&&x.weight!=null)?x.weight+' kg':'';
  return `<div class="card ex" onclick="editExercise('${x.id}')">
    <div class="top"><div class="nm">${esc(machineName(x.machineId))}</div>${statusBadge(x.status)}</div>
    <div class="row between"><div class="big">${x.sets} × ${x.reps} <small>rép</small>${w?' · '+w:''}${isPR?'<span class="pr">🏆 record</span>':''}</div></div>
    ${configs?`<div class="tags">${configs}</div>`:''}${x.comment?`<div class="cmt">${esc(x.comment)}</div>`:''}</div>`;
}

/** Onglet "Aujourd'hui" : séance du jour + bouton "Répéter la dernière séance". */
function renderToday(){
  const t=todayISO();
  // Plus récemment créé d'abord (id horodaté décroissant)
  const items=state.exercises.filter(x=>x.date===t).sort((a,b)=>String(b.id).localeCompare(String(a.id)));
  const hasPast=state.exercises.some(x=>x.date<t);
  const body=items.length
    ? items.map(exerciseCard).join('')
    : `<div class="card"><div class="empty">Pas encore d'exercice aujourd'hui.<br>Appuie sur « ＋ Nouvel exercice » pour démarrer ta séance 💪</div></div>`;
  setView(`<h1>Aujourd'hui</h1><p class="sub">${fmtDateFull(t)}</p>
    ${hasPast?`<button class="btn ghost" style="margin-top:12px" onclick="repeatLastSession()">↻ Répéter la dernière séance</button>`:''}
    ${items.length?`<div class="dayhead" style="margin-top:18px"><span class="d">Séance du jour</span><span class="c">${items.length} exercice${items.length>1?'s':''}</span></div>`:'<div style="height:14px"></div>'}
    ${body}<div style="height:80px"></div>`);
}

/** Barres "Équilibre" (exercices par groupe, semaine en cours). */
function balanceHTML(){
  const counts=weekGroupCounts();
  const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  if(!entries.length) return '<div class="empty">Aucun exercice cette semaine.</div>';
  const max=Math.max(...entries.map(e=>e[1]));
  return entries.map(([g,n])=>`<div class="bal"><span class="g">${g}</span><div class="track"><div class="fill" style="width:${Math.round(n/max*100)}%"></div></div><span class="n">${n}</span></div>`).join('');
}

/** Onglet "Cette semaine" : objectif, régularité, équilibre, séances récentes. */
function renderWeek(){
  const ws=startOfWeek(new Date());
  const doneSet=gymDays(ws);
  const done=doneSet.size, goal=state.settings.weeklyGoal||1;
  const pct=Math.min(done/goal,1), remaining=Math.max(goal-done,0);
  const R=36, C=2*Math.PI*R, off=C*(1-pct), todayStr=todayISO();

  // Pastilles de la semaine (style "prise de médicaments")
  let daysHtml='';
  for(let i=0;i<7;i++){
    const d=new Date(ws); d.setDate(ws.getDate()+i);
    const iso=isoDate(d), dn=doneSet.has(iso), td=iso===todayStr;
    daysHtml+=`<div class="day"><span class="lbl">${DAY_LETTER[i]}</span><div class="dot ${dn?'done':''} ${td?'today':''}">${dn?'✓':''}</div><span class="dnum">${d.getDate()}</span></div>`;
  }

  // Régularité : 5 dernières semaines
  let histHtml='';
  for(let w=4;w>=0;w--){
    const s=new Date(ws); s.setDate(ws.getDate()-7*w);
    const set=gymDays(s);
    let dots='';
    for(let i=0;i<7;i++){ const d=new Date(s); d.setDate(s.getDate()+i); dots+=`<div class="mini ${set.has(isoDate(d))?'done':''}"></div>`; }
    histHtml+=`<div class="histweek"><span class="wk${w===0?' cur':''}">${weekRangeLabel(s)}</span><div class="minidots">${dots}</div></div>`;
  }

  // Séances récentes (3 derniers jours d'entraînement)
  const recent=groupByDate([...state.exercises].sort((a,b)=>b.date.localeCompare(a.date))).slice(0,3);
  const recentHtml=recent.length
    ? recent.map(g=>`<div class="dayhead"><span class="d">${fmtDate(g.date)}</span><span class="c">${g.items.length} exo${g.items.length>1?'s':''}</span></div>${g.items.map(exerciseCard).join('')}`).join('')
    : `<div class="card"><div class="empty">Aucune séance enregistrée pour l'instant.</div></div>`;

  // Message d'objectif
  let msg,sub;
  if(remaining===0){ msg='Objectif atteint ! 🎉'; sub='Bravo, '+goal+' séances faites cette semaine.'; }
  else if(remaining===1){ msg='Plus qu\'une séance'; sub='Encore 1 passage pour valider ta semaine.'; }
  else { msg=remaining+' séances restantes'; sub=done+' sur '+goal+' faites cette semaine.'; }

  const endW=new Date(ws); endW.setDate(ws.getDate()+6);
  const range=ws.toLocaleDateString('fr-CH',{day:'numeric',month:'short'})+' – '+endW.toLocaleDateString('fr-CH',{day:'numeric',month:'short'});

  setView(`<h1>Cette semaine</h1><p class="sub">${range}</p>
    <div class="card" style="margin-top:14px"><div class="goalwrap">
      <div class="ring"><svg width="84" height="84">
        <circle cx="42" cy="42" r="${R}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="7"/>
        <circle cx="42" cy="42" r="${R}" fill="none" stroke="var(--accent)" stroke-width="7" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}"/>
      </svg><div class="num"><b>${done}/${goal}</b><span>séances</span></div></div>
      <div class="goalmsg">${msg}<small>${sub}</small></div></div>
      <div class="week">${daysHtml}</div></div>
    <h2>Régularité</h2><div class="card">${histHtml}</div>
    <h2>Équilibre (cette semaine)</h2><div class="card">${balanceHTML()}</div>
    <h2>Séances récentes</h2>${recentHtml}<div style="height:70px"></div>`);
}

/** Carte d'une machine dans la liste (vignette + résumé). */
function machineCardHTML(m){
  const ss=state.exercises.filter(x=>x.machineId===m.id).sort((a,b)=>b.date.localeCompare(a.date));
  const last=ss[0];
  let meta;
  if(!last) meta='Aucun exercice';
  else if(m.type==='cardio') meta=`${ss.length} séance${ss.length>1?'s':''} · dernier : ${last.duree} min · niv ${last.niveau}`;
  else meta=`${ss.length} exo${ss.length>1?'s':''} · dernier : ${last.sets}×${last.reps}${last.weight?(' · '+last.weight+'kg'):''}`;
  return `<div class="card mcard" onclick="openMachine('${m.id}')"><div class="mleft">${machineThumbHTML(m)}<div><div class="name">${esc(m.name)}</div><div class="meta">${meta}</div></div></div><span class="chev">›</span></div>`;
}

/** Onglet "Machines" : liste rangée par catégorie/groupe. */
function renderMachines(){
  let html=''; const used=new Set();
  GROUPS.forEach(g=>{
    const ms=state.machines.filter(m=>(m.group||'Autre')===g);
    if(!ms.length) return;
    html+=`<h2>${g}</h2><div class="mlist">`+ms.map(machineCardHTML).join('')+`</div>`;
    ms.forEach(m=>used.add(m.id));
  });
  const rest=state.machines.filter(m=>!used.has(m.id)); // sécurité : groupe inconnu
  if(rest.length) html+=`<h2>Autre</h2><div class="mlist">`+rest.map(machineCardHTML).join('')+`</div>`;
  setView(`<h1>Machines</h1><p class="sub">Regroupées par catégorie · touche pour l'historique et la progression</p>${html}<div style="height:70px"></div>`);
}

/** Écran de détail d'une machine : progression, records, historique. */
function openMachine(id){
  const m=machine(id); if(!m) return;
  const cardio=m.type==='cardio';
  const ss=state.exercises.filter(x=>x.machineId===id).sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)); // récents d'abord
  const chron=[...ss].sort((a,b)=>a.date.localeCompare(b.date)||a.id.localeCompare(b.id));                                  // chronologique (courbes)
  let chart='', records='';

  if(cardio){
    // --- Progression CARDIO : durée + niveau ---
    if(chron.length>=2){
      const dates=chron.map(x=>x.date), first=chron[0].date, last=chron[chron.length-1].date;
      chart=`<h2>Progression <span class="muted" style="text-transform:none;letter-spacing:0;font-weight:400">· touche les courbes</span></h2><div class="card">
        <p class="note" style="margin-top:0">Du ${fmtDate(first)} au ${fmtDate(last)} · ${chron.length} séances</p>
        ${metricBlock('Durée (min)',chron.map(x=>Number(x.duree)),dates,' min','var(--accent)')}
        ${metricBlock('Niveau',chron.map(x=>Number(x.niveau)),dates,'','var(--amber)')}</div>`;
    } else if(chron.length===1){
      chart=`<h2>Progression</h2><div class="card"><div class="empty">Ajoute au moins 2 séances sur cette machine pour voir les courbes d'évolution.</div></div>`;
    }
    if(ss.length>=1){
      const durs=ss.map(x=>Number(x.duree)), maxD=Math.max(...durs), recD=ss.find(x=>Number(x.duree)===maxD);
      const maxL=Math.max(...ss.map(x=>Number(x.niveau)));
      records=`<h2>Records</h2><div class="card">
        <div class="rec"><span>⏱ Durée max</span><b>${maxD} min <small>le ${fmtDate(recD.date)}</small></b></div>
        <div class="rec"><span>Niveau max</span><b>${maxL}</b></div></div>`;
    }
  } else {
    // --- Progression MUSCU : poids + séries + répétitions ---
    if(chron.length>=2){
      const dates=chron.map(x=>x.date), first=chron[0].date, last=chron[chron.length-1].date;

  if(isCardioMachine(x.machineId))
    return {id:uid(),date:todayISO(),machineId:x.machineId,programme:x.programme,niveau:x.niveau,duree:x.duree,rpm:x.rpm??'',distance:x.distance??'',comment:''};

function repeatLastSession(){
  const days=[...new Set(state.exercises.map(x=>x.date))].filter(d=>d<todayISO()).sort();
  const past=days.pop();
  if(!past){ toast('Aucune séance précédente'); return; }
  const items=state.exercises.filter(x=>x.date===past);
  const doIt=()=>{
    items.forEach(x=>state.exercises.push(cloneForToday(x)));
    save(); render(); toast('Séance répétée ('+items.length+' exercice'+(items.length>1?'s':'')+') ✓');

    askConfirm('Ajouter les '+items.length+' exercices de la séance du '+fmtDate(past)+' à aujourd\'hui ?', doIt,'Répéter');

  state.exercises.push(cloneForToday(x));

/* ===== Minuteur de repos (lancé manuellement via la bulle ⏱) =====
   Le décompte est calculé à partir d'un HORODATAGE de fin (restEnd) plutôt
   qu'avec un simple compteur : ainsi le temps réel s'écoule même si l'app
   est mise en arrière-plan ou fermée, puis rouverte. L'état est aussi
   sauvegardé dans localStorage pour survivre à un rechargement complet. */
const REST_KEY='edoworkout-rest';
let restInt=null;      // intervalle d'affichage (1 s)
let restEnd=0;         // horodatage (ms) de fin du repos
let restTot=0;         // durée totale (s) pour la barre de progression
let restDone=false;    // le repos est-il déjà terminé ?
let actx=null;
function initAudio(){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }catch(e){} }
function beep(){
  try{
    if(!actx) return;
    const o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination); o.type='sine'; o.frequency.value=880;
    g.gain.setValueAtTime(0.0001,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.3,actx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+0.45);
    o.start(); o.stop(actx.currentTime+0.47);
  }catch(e){}
}
function showRest(){ document.getElementById('restbar').classList.add('show'); updateFloating(); }
function hideRest(){ document.getElementById('restbar').classList.remove('show'); updateFloating(); }

/** Secondes restantes (peut être négatif → 0). */
function restRemaining(){ return Math.max(0,Math.ceil((restEnd-Date.now())/1000)); }

/** Met à jour l'affichage (temps + barre). */
function restUI(){
  const el=document.getElementById('rest-time');
  if(restDone){
    el.textContent='Terminé'; el.classList.add('done');
    document.getElementById('rest-fill').style.width='0%';
    return;
  }
  el.classList.remove('done');
  const rem=restRemaining();
  el.textContent=rem+' s';
  document.getElementById('rest-fill').style.width=(restTot?rem/restTot*100:0)+'%';
}

/** Boucle d'affichage : se base sur l'heure réelle, déclenche la fin au bon moment. */
function restTick(){
  if(restDone) return;
  if(restRemaining()<=0){ finishRest(); return; }
  restUI();
}
function startInterval(){ if(restInt) clearInterval(restInt); restInt=setInterval(restTick,250); }
function persistRest(){ try{ localStorage.setItem(REST_KEY,JSON.stringify({end:restEnd,tot:restTot})); }catch(e){} }
function clearPersistRest(){ try{ localStorage.removeItem(REST_KEY); }catch(e){} }

function startRest(sec){
  initAudio();                                        // prépare l'audio dans le geste utilisateur (iOS)
  restDone=false; restTot=sec; restEnd=Date.now()+sec*1000;
  persistRest(); showRest(); restUI(); startInterval();
}
function addRest(s){
  if(restDone){ // relance un court repos si on rajoute du temps après la fin
    restDone=false; document.getElementById('rest-time').classList.remove('done');
    restEnd=Date.now()+s*1000; restTot=s;
  } else {
    restEnd+=s*1000; restTot=Math.max(restTot,restRemaining());
  }
  persistRest(); startInterval(); restUI();
}
function stopRest(){
  if(restInt){ clearInterval(restInt); restInt=null; }
  restDone=false; document.getElementById('rest-time').classList.remove('done');
  clearPersistRest(); hideRest();
}
function finishRest(){
  if(restInt){ clearInterval(restInt); restInt=null; }
  restDone=true; restUI();                            // affiche "Terminé" clignotant (vert pomme)
  clearPersistRest();
  try{ if(navigator.vibrate) navigator.vibrate([130,70,130]); }catch(e){}
  beep();                                             // pas de toast/notification supplémentaire
  setTimeout(()=>{ if(restDone){ document.getElementById('rest-time').classList.remove('done'); hideRest(); restDone=false; } },4000);
}

/** Reprend un repos en cours après réouverture/rechargement de l'app. */
function resumeRest(){
  let saved=null; try{ saved=JSON.parse(localStorage.getItem(REST_KEY)); }catch(e){}
  if(!saved||!saved.end){ return; }
  restEnd=saved.end; restTot=saved.tot||Math.ceil((saved.end-Date.now())/1000);
  if(restRemaining()>0){ restDone=false; showRest(); restUI(); startInterval(); }
  else { clearPersistRest(); }                        // déjà fini pendant l'absence : on n'affiche rien
}
// Quand l'app revient au premier plan, on resynchronise immédiatement l'affichage.
document.addEventListener('visibilitychange',()=>{ if(!document.hidden){ if(localStorage.getItem(REST_KEY)) resumeRest(); else restTick(); setTimeout(nudgeLayout,60); } });
window.addEventListener('focus',()=>{ if(localStorage.getItem(REST_KEY)) resumeRest(); setTimeout(nudgeLayout,60); });

/** Ouvre le formulaire (nouvel exercice ou édition). */
function openForm(opts){
  opts=opts||{}; editingId=opts.id||null; clearErrors();
  const sel=document.getElementById('f-machine');
  sel.innerHTML=state.machines.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('');

  if(editingId){
    // --- Édition : on garde la date d'origine (lecture seule) ---
    const x=state.exercises.find(e=>e.id===editingId), cardio=isCardioMachine(x.machineId);
    document.getElementById('sheet-title').textContent='Modifier l\'exercice';
    document.getElementById('date-readonly').style.display='block';
    document.getElementById('f-date-label').textContent=fmtDateFull(x.date);
    sel.value=x.machineId; setFormMode(x.machineId);
    if(cardio){
      document.getElementById('f-prog').value=x.programme||'Manuel'; document.getElementById('f-level').value=x.niveau??''; document.getElementById('f-dur').value=x.duree??30;
      document.getElementById('f-rpm').value=x.rpm??''; document.getElementById('f-dist').value=x.distance??'';
    } else {
      document.getElementById('f-weight').value=x.weight; document.getElementById('f-sets').value=x.sets; document.getElementById('f-reps').value=x.reps;
      setStatus(x.status||'success'); clearConfigs(); (x.configs||[]).slice(0,MAX_CONFIGS).forEach(c=>addConfigRow(c));
    }
    document.getElementById('f-comment').value=x.comment||'';
    document.getElementById('f-delete').style.display='block';
  } else {
    // --- Nouveau : daté d'aujourd'hui, pré-rempli via la mini-mémoire ---
    document.getElementById('sheet-title').textContent='Nouvel exercice';
    document.getElementById('date-readonly').style.display='none';
    if(opts.machineId) sel.value=opts.machineId;
    setFormMode(sel.value); setStatus('success'); document.getElementById('f-comment').value='';
    prefillFromLast(sel.value);
    document.getElementById('f-delete').style.display='none';
  }

  document.getElementById('sheet-bg').classList.add('open');
  setTimeout(()=>document.getElementById('sheet').classList.add('open'),10);
}
function closeForm(){ document.getElementById('sheet').classList.remove('open'); setTimeout(()=>document.getElementById('sheet-bg').classList.remove('open'),260); }

/** Valide puis enregistre l'exercice (création ou modification). */
function saveExercise(){
  const machineId=document.getElementById('f-machine').value, cardio=isCardioMachine(machineId);
  const comment=document.getElementById('f-comment').value.trim();
  const wasEditing=!!editingId;
  let data, isPR=false;

  if(cardio){
    // --- Validation CARDIO ---
    let ok=true;
    const lRaw=document.getElementById('f-level').value.trim(), lvl=Number(lRaw);
    const lOk=/^\d+$/.test(lRaw)&&lvl>=1&&lvl<=25; showErr('level',!lOk); if(!lOk) ok=false;
    const dRaw=document.getElementById('f-dur').value.trim(), dur=Number(dRaw);
    const dOk=/^\d+$/.test(dRaw)&&dur>=1; showErr('dur',!dOk); if(!dOk) ok=false;
    // Champs facultatifs : tour/minute (numérique ≥ 0 si renseigné) + distance (texte libre)
    const rpmRaw=document.getElementById('f-rpm').value.trim().replace(',','.');
    let rpm='';
    if(rpmRaw!==''){ const rOk2=/^\d*\.?\d+$/.test(rpmRaw)&&Number(rpmRaw)>=0; showErr('rpm',!rOk2); if(!rOk2) ok=false; else rpm=Math.round(Number(rpmRaw)*100)/100; }
    else showErr('rpm',false);
    const distance=document.getElementById('f-dist').value.trim();
    if(!ok){ toast('Vérifie les champs en rouge'); return; }
    data={machineId,programme:document.getElementById('f-prog').value,niveau:lvl,duree:dur,rpm,distance,comment};
  } else {
    // --- Validation MUSCU ---
    let ok=true;
    const wRaw=document.getElementById('f-weight').value.trim().replace(',','.'), w=Number(wRaw);
    const wOk=wRaw!==''&&/^\d*\.?\d+$/.test(wRaw)&&isFinite(w)&&w>=0; showErr('weight',!wOk); if(!wOk) ok=false;
    const sRaw=document.getElementById('f-sets').value.trim(), sets=Number(sRaw);
    const sOk=/^\d+$/.test(sRaw)&&sets>=1; showErr('sets',!sOk); if(!sOk) ok=false;
    const rRaw=document.getElementById('f-reps').value.trim(), reps=Number(rRaw);
    const rOk=/^\d+$/.test(rRaw)&&reps>=1; showErr('reps',!rOk); if(!rOk) ok=false;
    if(!ok){ toast('Vérifie les champs en rouge'); return; }
    const configs=[...document.querySelectorAll('#f-configs input')].map(i=>i.value.trim()).filter(Boolean).slice(0,MAX_CONFIGS);
    const wval=Math.round(w*100)/100;
    // Détection d'un record de poids (vs les exercices précédents de cette machine)
    let priorMax=null;
    const ws=state.exercises.filter(e=>e.machineId===machineId&&e.id!==editingId).map(e=>Number(e.weight));
    if(ws.length) priorMax=Math.max(...ws);
    isPR = priorMax!=null && wval>priorMax && wval>0;
    data={machineId,weight:wval,sets,reps,status:curStatus,configs,comment};
  }

  if(editingId){
    // Remplace proprement les champs (en gardant id + date)
    const x=state.exercises.find(e=>e.id===editingId);
    Object.keys(x).forEach(k=>{ if(!['id','date'].includes(k)) delete x[k]; });
    Object.assign(x,data);
  } else {
    state.exercises.push({id:uid(),date:todayISO(),...data});
  }

  save(); closeForm();
  if(document.getElementById('screen-machine').classList.contains('open')) openMachine(machineId); else render();
  toast(wasEditing?'Exercice modifié ✓':(isPR?'Nouveau record 🏆 '+data.weight+' kg !':(cardio?'Séance ajoutée ✓':'Exercice ajouté ✓')));
  // NB : le minuteur de repos ne démarre plus automatiquement (bulle ⏱ manuelle).
}
function editExercise(id){ openForm({id}); }
function deleteCurrent(){
  if(!editingId) return;
  askConfirm('Supprimer cet exercice ?', ()=>{
    const mid=state.exercises.find(e=>e.id===editingId)?.machineId;
    state.exercises=state.exercises.filter(e=>e.id!==editingId);
    save(); closeForm();
    if(document.getElementById('screen-machine').classList.contains('open')&&mid) openMachine(mid); else render();
    toast('Exercice supprimé');
  },'Supprimer');
}

/* ===== Sauvegarde / export ===== */
function downloadText(name,content,mime){
  try{
    const blob=new Blob([content],{type:mime+';charset=utf-8'}), url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=name;
    a.style.cssText='position:fixed;left:-9999px;top:0;opacity:0';  // hors-flux : n'altère pas la mise en page
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },1000);
    setTimeout(nudgeLayout,400);                                   // resynchronise les barres fixes au retour
  }catch(e){ console.warn(e); }
}
/** Corrige le mauvais placement des éléments en position:fixed (barre d'onglets,
    boutons flottants) après une feuille système iOS (partage/enregistrement de
    fichier), qui décale parfois ces barres au milieu de l'écran. */
function nudgeLayout(){
  try{
    const tb=document.querySelector('.tabbar');
    if(tb){ tb.style.transform='translateZ(0)'; void tb.offsetHeight; tb.style.transform=''; }
    document.body.style.minHeight='100dvh';
    void document.body.offsetHeight;                               // force un recalcul de mise en page
    window.scrollTo(0,window.scrollY);
  }catch(e){}
}
function exportBackup(){
  const payload={app:'edoWorkout',version:VERSION,exported:new Date().toISOString(),settings:state.settings,machines:state.machines,exercises:state.exercises};
  const content=JSON.stringify(payload,null,2);
  downloadText('edoworkout-sauvegarde-'+todayISO()+'.json',content,'application/json');
  if(navigator.clipboard) navigator.clipboard.writeText(content).catch(()=>{});
  toast('Sauvegarde exportée ✓');
}
function importBackup(){ document.getElementById('import-file').click(); }
document.getElementById('import-file').addEventListener('change',function(e){
  const file=e.target.files&&e.target.files[0]; e.target.value=''; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    let data; try{ data=JSON.parse(reader.result); }catch(err){ toast('Fichier illisible'); return; }
    if(!data||!Array.isArray(data.exercises)||!Array.isArray(data.machines)){ toast('Sauvegarde invalide'); return; }
    askConfirm('Restaurer cette sauvegarde ? Elle remplacera tes données actuelles ('+data.exercises.length+' exercices, '+data.machines.length+' machines).', ()=>{
      state={settings:data.settings||{weeklyGoal:3,restSeconds:60},machines:data.machines,exercises:data.exercises};
      normalize(); save(); closeOverlays(); render(); toast('Sauvegarde restaurée ✓');
    },'Restaurer');
  };
  reader.readAsText(file);
});
function csvCell(v){ v=String(v??''); return /[",\r\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function buildCSV(){
  const rows=[['Date','Machine','Type','Groupe','Poids (kg)','Series','Repetitions','Programme','Niveau','Duree (min)','Tr/min','Distance','Resultat','Configurations','Commentaire']];
  [...state.exercises].sort((a,b)=>a.date.localeCompare(b.date)).forEach(x=>{
    const cardio=isCardioMachine(x.machineId);
    const cfg=cardio?'':(x.configs||[]).map((c,i)=>'Configuration '+(i+1)+': '+c).join(' | ');
    rows.push([x.date,machineName(x.machineId),cardio?'Cardio':'Musculation',machineGroup(x.machineId),
      cardio?'':x.weight, cardio?'':x.sets, cardio?'':x.reps,
      cardio?x.programme:'', cardio?x.niveau:'', cardio?x.duree:'',
      cardio?(x.rpm??''):'', cardio?(x.distance??''):'',
      cardio?'':statusLabel(x.status), cfg, x.comment||'']);
  });
  return rows.map(r=>r.map(csvCell).join(',')).join('\r\n');
}
function buildMD(){
  let md='# edoWorkout\n\n';
  groupByDate([...state.exercises]).slice().reverse().forEach(g=>{
    md+='## Séance du '+fmtDateFull(g.date)+'\n\n';
    g.items.forEach(x=>{
      const cardio=isCardioMachine(x.machineId);
      if(cardio){
        md+='### '+machineName(x.machineId)+' (Cardio)\n';
        md+='- **Programme :** '+x.programme+'\n- **Niveau :** '+x.niveau+'\n- **Durée :** '+x.duree+' min\n';
        if(x.rpm!==''&&x.rpm!=null) md+='- **Tour / minute :** '+x.rpm+'\n';
        if(x.distance!==''&&x.distance!=null) md+='- **Distance :** '+x.distance+'\n';
      } else {
        md+='### '+machineName(x.machineId)+' ('+machineGroup(x.machineId)+')\n';
        md+='- **Poids :** '+x.weight+' kg\n- **Séries × répétitions :** '+x.sets+' × '+x.reps+'\n- **Résultat :** '+statusLabel(x.status)+'\n';
        (x.configs||[]).forEach((c,i)=>{ md+='- **Configuration '+(i+1)+' :** '+c+'\n'; });
      }
      if(x.comment) md+='- **Commentaire :** '+x.comment+'\n';
      md+='\n';
    });
  });
  return md;
}
function exportData(kind){
  if(!state.exercises.length){ toast('Aucune donnée à exporter'); return; }
  const isCsv=kind==='csv', content=isCsv?buildCSV():buildMD(), name='edoworkout.'+(isCsv?'csv':'md');
  downloadText(name,content,isCsv?'text/csv':'text/markdown');
  if(navigator.clipboard){ navigator.clipboard.writeText(content).then(()=>toast(name+' exporté ✓'),()=>toast('Export généré')); } else toast('Export généré');
}

/* ===== Toast (message éphémère) ===== */
let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2100);
}

/* ===== PWA : manifest + icône + service worker ===== */
function setupPWA(){
  try{
    // Icône écran d'accueil (iOS)
    const icon=document.createElement('link'); icon.rel='apple-touch-icon'; icon.href=ICON_URL; document.head.appendChild(icon);
    // Manifest généré à la volée (Blob)
    const m={name:'edoWorkout',short_name:'edoWorkout',start_url:'.',scope:'.',display:'standalone',orientation:'portrait',
      background_color:'#0b0c0e',theme_color:'#0b0c0e',
      icons:[{src:ICON_URL,sizes:'192x192',type:'image/svg+xml',purpose:'any'},{src:ICON_URL,sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'}]};
    const ml=document.createElement('link'); ml.rel='manifest';
    ml.href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/manifest+json'})); document.head.appendChild(ml);
  }catch(e){}
  // Service worker : actif uniquement si hébergé en http(s) avec un sw.js à côté
  try{ if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){ navigator.serviceWorker.register('sw.js').catch(()=>{}); } }catch(e){}
}

/* ===== Démarrage ===== */
const _local=readLocal();                  // données locales éventuelles
const _hadLocal=!!_local;
state=_local||{settings:{weeklyGoal:3,restSeconds:60},machines:[],exercises:[]};
normalize();
render();                                  // rendu immédiat (instantané)
resumeRest();                              // reprend un repos en cours (app rouverte / rechargée)

(async function init(){
  db=await idbOpen();
  // Filet de sécurité : localStorage vidé mais base intacte → on restaure depuis la base
  if(db){ const fromIdb=await idbGet(); if(fromIdb && !_hadLocal){ state=fromIdb; normalize(); render(); } }
  // Demande de stockage persistant (anti-purge iOS)
  try{
    if(navigator.storage){
      if(navigator.storage.persisted) storagePersisted=await navigator.storage.persisted();
      if(!storagePersisted && navigator.storage.persist) storagePersisted=await navigator.storage.persist();
    }
  }catch(e){}
  save();                                  // aligne les deux stockages
  setupPWA();
  if(currentTab==='settings') renderSettings(); // rafraîchit la note de stockage si on est dans Réglages
})();
</script>
